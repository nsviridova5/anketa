<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>    </title>
  <style>
    :root {
      --ink: #16344d;
      --muted: #5f7180;
      --accent: #cda15e;
      --bg: #f6f1e7;
      --surface: rgba(255, 253, 249, 0.96);
      --line: rgba(22, 52, 77, 0.1);
      --shadow: 0 18px 50px rgba(22, 52, 77, 0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(205, 161, 94, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(22, 52, 77, 0.08), transparent 30%),
        linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      line-height: 1.5;
    }

    .shell {
      width: min(1100px, calc(100% - 32px));
      margin: 32px auto 56px;
    }

    .hero {
      padding: 44px 42px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(255, 253, 249, 0.98), rgba(247, 240, 228, 0.96));
      border: 1px solid rgba(22, 52, 77, 0.08);
      box-shadow: 0 28px 70px rgba(22, 52, 77, 0.1);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 136px 1fr;
      gap: 32px;
      align-items: center;
    }

    .logo-wrap {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 24px;
      padding: 14px;
      box-shadow: inset 0 0 0 1px rgba(22, 52, 77, 0.08), 0 18px 34px rgba(22, 52, 77, 0.08);
    }

    .logo-wrap img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(22, 52, 77, 0.06);
      color: #8b6431;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      max-width: 760px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 0.98;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 16px;
    }

    .hero-notes {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .note-pill {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(22, 52, 77, 0.08);
      font-size: 13px;
    }

    .progress-card {
      position: sticky;
      top: 14px;
      z-index: 10;
      margin: 18px 0 22px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 253, 249, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(22, 52, 77, 0.08);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .progress-label { font-weight: 700; }
    .progress-count { color: var(--muted); }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(22, 52, 77, 0.08);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #e0b77b 55%, var(--ink));
      transition: width 0.25s ease;
    }

    form {
      display: grid;
      gap: 20px;
    }

    .section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 24px 24px 18px;
      background:
        linear-gradient(135deg, rgba(22, 52, 77, 0.96), rgba(22, 52, 77, 0.86)),
        linear-gradient(90deg, rgba(205, 161, 94, 0.3), transparent 50%);
      color: #fff;
    }

    .section-kicker {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.74);
    }

    .section-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }

    .section-desc {
      margin: 10px 0 0;
      max-width: 760px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 15px;
    }

    .section-body {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(248, 243, 234, 0.64), rgba(255, 255, 255, 0.92));
      border: 1px solid rgba(22, 52, 77, 0.08);
    }

    .field label,
    .field .field-legend {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 16px;
    }

    .field-hint {
      display: block;
      margin-top: -4px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="text"],
    input[type="url"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(22, 52, 77, 0.14);
      border-radius: var(--radius-md);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: rgba(205, 161, 94, 0.9);
      box-shadow: 0 0 0 4px rgba(205, 161, 94, 0.16);
    }

    .check-grid {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }

    .check-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(22, 52, 77, 0.08);
    }

    .check-item input {
      margin-top: 2px;
      accent-color: var(--ink);
    }

    .scale {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .scale input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .scale label {
      margin: 0;
      padding: 14px 10px;
      border-radius: 16px;
      text-align: center;
      background: #fff;
      border: 1px solid rgba(22, 52, 77, 0.12);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .scale input:checked + label {
      border-color: rgba(205, 161, 94, 0.95);
      background: rgba(205, 161, 94, 0.14);
      transform: translateY(-2px);
    }

    .scale-note {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .submit-card {
      padding: 26px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(22, 52, 77, 1), rgba(30, 63, 90, 0.96));
      color: #fff;
      box-shadow: var(--shadow);
    }

    .submit-card h2 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
    }

    .submit-card p {
      margin: 0 0 18px;
      color: rgba(255, 255, 255, 0.78);
      max-width: 760px;
    }

    .submit-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), #e3be87);
      color: #1d2d3b;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .status {
      margin-top: 18px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.96);
      font-size: 17px;
      line-height: 1.45;
      font-weight: 600;
      display: none;
    }

    .status.is-visible { display: block; }

    .status.is-success {
      background: linear-gradient(135deg, rgba(205, 161, 94, 0.26), rgba(255, 255, 255, 0.14));
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .status.is-error {
      background: rgba(120, 16, 16, 0.26);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    @media (max-width: 860px) {
      .hero-grid,
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .hero { padding: 24px; }
      .logo-wrap { width: 122px; }
      .scale { grid-template-columns: 1fr; }
      .scale-note { flex-direction: column; }
    }
  </style>
</head>
<body>

        <div class="section-body">

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_mavDNv4_woMdh_0VHfbTlK491AiWGYHopp5huO3bp_dU-cWtrjOhj4VIPAGozx57/exec";
    const form = document.getElementById("questionnaireForm");
    const progressBar = document.getElementById("progressBar");
    const progressValue = document.getElementById("progressValue");
    const statusBox = document.getElementById("statusBox");
    const saveToDriveButton = document.getElementById("saveToDrive");
    const payloadField = document.getElementById("payloadField");
    const trackedFields = Array.from(form.querySelectorAll("input, textarea, select"));

    function isFieldFilled(field) {
      if (field.type === "radio") {
        return form.querySelector(`input[name="${field.name}"]:checked`) !== null;
      }
      if (field.type === "checkbox") {
        return field.checked;
      }
      return field.value.trim() !== "";
    }

    function updateProgress() {
      const trackable = trackedFields.filter((field) => field.name && field.type !== "hidden");
      const uniqueNames = [...new Set(trackable.map((field) => (field.type === "radio" || field.type === "checkbox") ? `${field.type}:${field.name}` : field.id))];
      let filled = 0;

      uniqueNames.forEach((key) => {
        if (key.startsWith("radio:")) {
          const name = key.replace("radio:", "");
          if (form.querySelector(`input[name="${name}"]:checked`)) filled += 1;
          return;
        }
        if (key.startsWith("checkbox:")) {
          const name = key.replace("checkbox:", "");
          if (form.querySelector(`input[name="${name}"]:checked`)) filled += 1;
          return;
        }
        const field = document.getElementById(key);
        if (field && isFieldFilled(field)) filled += 1;
      });

      const percent = uniqueNames.length ? Math.round((filled / uniqueNames.length) * 100) : 0;
      progressBar.style.width = `${percent}%`;
      progressValue.textContent = percent;
    }

    function showStatus(message, type = "success") {
      statusBox.textContent = message;
      statusBox.classList.remove("is-success", "is-error");
      statusBox.classList.add(type === "error" ? "is-error" : "is-success", "is-visible");
    }

    function getFieldValue(field) {
      const textarea = field.querySelector("textarea");
      if (textarea) return textarea.value.trim();

      const select = field.querySelector("select");
      if (select) return select.value.trim();

      const textInput = field.querySelector('input[type="text"], input[type="email"], input[type="url"]');
      if (textInput) return textInput.value.trim();

      const checkedRadio = field.querySelector('input[type="radio"]:checked');
      if (checkedRadio) {
        const label = field.querySelector(`label[for="${checkedRadio.id}"]`);
        return label ? label.textContent.trim() : checkedRadio.value.trim();
      }

      const checkedBoxes = Array.from(field.querySelectorAll('input[type="checkbox"]:checked'))
        .map((input) => input.value.trim())
        .filter(Boolean);

      return checkedBoxes.join(", ");
    }

    function collectStructuredAnswers() {
      return Array.from(document.querySelectorAll(".section")).map((section) => {
        const title = section.querySelector(".section-title")?.textContent.trim() || "";
        const answers = Array.from(section.querySelectorAll(".field"))
          .map((field) => {
            const label = field.querySelector("label, .field-legend");
            const question = label ? label.textContent.replace(/\s+/g, " ").trim() : "";
            const answer = getFieldValue(field) || " ";
            return { question, answer };
          })
          .filter((item) => item.question);

        return { title, answers };
      });
    }

    function getValueByName(name) {
      const field = form.querySelector(`[name="${name}"]`);
      if (!field) return "";
      if (field.type === "radio") {
        return form.querySelector(`input[name="${name}"]:checked`)?.value || "";
      }
      return field.value ? field.value.trim() : "";
    }

    function buildPayload() {
      return {
        submittedAt: new Date().toISOString(),
        clientName: getValueByName("clientName"),
        contactEmail: getValueByName("contactEmail"),
        companyName: getValueByName("companyName"),
        companySite: getValueByName("companySite"),
        financeLiteracy: form.querySelector('input[name="financeLiteracy"]:checked')?.value || "",
        reportFormat: Array.from(form.querySelectorAll('input[name="reportFormat"]:checked')).map((input) => input.value),
        answers: collectStructuredAnswers()
      };
    }

    trackedFields.forEach((field) => {
      field.addEventListener("input", updateProgress);
      field.addEventListener("change", updateProgress);
    });

    saveToDriveButton.addEventListener("click", () => {
      showStatus("       Google Sheets   Google Drive.", "success");
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (!GOOGLE_SCRIPT_URL) {
        showStatus("  URL  Google Apps Script.", "error");
        return;
      }

      try {
        payloadField.value = JSON.stringify(buildPayload());
        form.action = GOOGLE_SCRIPT_URL;
        form.target = "sheetSubmitFrame";
        form.method = "POST";
        form.submit();
        showStatus("   .       Google Drive.", "success");
        form.reset();
        updateProgress();
      } catch (error) {
        showStatus("   .       Google Apps Script.", "error");
      }
    });

    updateProgress();
  </script>
</body>
</html>
